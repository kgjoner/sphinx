version: "2"
sql:
  - engine: "postgresql"
    queries: "queries/"
    schema: "migrations/"
    gen:
      go:
        package: "psqlrepo"
        out: "."
        emit_empty_slices: true
        emit_pointers_for_null_types: true
        rename:
          comic_issue: "Issue"
        overrides:
          - go_type:
              type: "int"
            db_type: "pg_catalog.int4"
          - go_type:
              type: "[]int64"
            column: subscription.transaction_ids

