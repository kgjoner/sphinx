{{- if empty .Values.secret.existentName }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ template "api.secretName" . }}
type: Opaque
data:
  DATABASE_URL: {{ .Values.secret.databaseURL | b64enc | quote }}
  REDIS_URL: {{ .Values.secret.redisURL | b64enc | quote }}
  ROOT_APP_ID: {{ .Values.secret.rootAppID | b64enc | quote }}
  JWT_SECRET: {{ .Values.secret.jwtSecret | b64enc | quote }}
  HERMES_API_KEY: {{ .Values.secret.hermesApiKey | b64enc | quote }}
  EXTERNAL_AUTH_PROVIDERS: {{ .Values.secret.externalAuthProviders | toJson | b64enc | quote }}
{{- end }}