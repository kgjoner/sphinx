{{- if and (.Values.db.enabled) (empty .Values.db.secret.existentName) }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ template "db.secretName" . }}
type: Opaque
data:
  POSTGRES_USER: {{ .Values.db.secret.user | b64enc | quote }}
  POSTGRES_PASSWORD: {{ .Values.db.secret.password | b64enc | quote }}
  POSTGRES_DB: {{ .Values.db.secret.database | b64enc | quote }}
{{- end }}