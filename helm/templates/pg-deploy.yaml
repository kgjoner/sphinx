{{- if .Values.db.enabled }}
apiVersion: apps/v1
kind: StatefulSet
metadata: 
  name: {{ template "sphinx.prefix" . }}-pg
  labels:
    app.kubernetes.io/name: postgres
    app.kubernetes.io/instance: {{ template "sphinx.prefix" . }}-postgres
    app.kubernetes.io/version: 16
    app.kubernetes.io/component: database
    app.kubernetes.io/part-of: {{ .Chart.Name }}
    app.kubernetes.io/managed-by: {{ .Release.Service }}
spec:
  serviceName: {{ template "sphinx.db.serviceName" . }}
  replicas: {{ .Values.db.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: postgres
      app.kubernetes.io/instance: {{ template "sphinx.prefix" . }}-postgres
  template:
    metadata: 
      labels:
        app.kubernetes.io/name: postgres
        app.kubernetes.io/instance: {{ template "sphinx.prefix" . }}-postgres
        app.kubernetes.io/version: 16
        app.kubernetes.io/component: database
        app.kubernetes.io/part-of: {{ .Chart.Name }}
        app.kubernetes.io/managed-by: {{ .Release.Service }}
    spec:
      containers:
      - name: {{ .Chart.Name }}-pg
        image: postgres:16.0
        ports:
        - containerPort: 5432
        envFrom:
        - secretRef:
            {{- if empty .Values.db.secret.existentName }}
              name: {{ template "sphinx.db.secretName" . }}
            {{- else }}
              name: {{ .Values.db.secret.existentName }}
            {{- end }}
        {{- if not (empty .Values.db.volume.className) }}
        volumeMounts:
        - name: {{ .Values.db.volume.name }}
          mountPath: /var/lib/postgresql/data
        env:
          - name: PGDATA
            value: /var/lib/postgresql/data/pgdata
  volumeClaimTemplates:
    - metadata:
        name: {{ .Values.db.volume.name }}
        labels:
          app.kubernetes.io/name: postgres
          app.kubernetes.io/instance: {{ template "sphinx.prefix" . }}-postgres
          app.kubernetes.io/component: database
      spec:
        accessModes:
          - {{ .Values.db.volume.accessMode }}
        resources:
          requests:
            storage: {{ .Values.db.volume.size }}
        storageClassName: {{ .Values.db.volume.className }}
  {{- end }}
{{- end }}