{{- if .Values.db.migration.enabled }}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ template "sphinx.prefix" . }}-migration
  labels:
    app.kubernetes.io/name: postgres
    app.kubernetes.io/instance: {{ template "sphinx.prefix" . }}-postgres
    app.kubernetes.io/version: 16
    app.kubernetes.io/component: database
    app.kubernetes.io/part-of: {{ .Chart.Name }}
    app.kubernetes.io/managed-by: {{ .Release.Service }}
  annotations:
    "helm.sh/hook": post-install,pre-upgrade
    "helm.sh/hook-delete-policy": hook-succeeded
spec:
  ttlSecondsAfterFinished: 300
  template:
    metadata:
      name: {{ template "sphinx.prefix" . }}-migration
      labels:
        app.kubernetes.io/name: postgres
        app.kubernetes.io/instance: {{ template "sphinx.prefix" . }}-postgres
        app.kubernetes.io/version: 16
        app.kubernetes.io/component: database
        app.kubernetes.io/part-of: {{ .Chart.Name }}
        app.kubernetes.io/managed-by: {{ .Release.Service }}
    spec:
      restartPolicy: Never
      initContainers:
      - name: wait-for-db
        image: postgres:16-alpine
        command:
          - sh
          - -c
          - |
            echo "Waiting for database to be ready..."
            # Parse DATABASE_URL to extract connection details
            # Format: postgresql://user:password@host:port/database
            HOST=$(echo "$DATABASE_URL" | sed -n 's/.*@\([^:]*\):.*/\1/p')
            PORT=$(echo "$DATABASE_URL" | sed -n 's/.*:\([0-9]*\)\/.*/\1/p')
            USER=$(echo "$DATABASE_URL" | sed -n 's/.*\/\/\([^:]*\):.*/\1/p')
            
            echo "Connecting to database at $HOST:$PORT as user $USER"
            
            until psql "$DATABASE_URL" -c '\q'; do
              echo "Database is unavailable - sleeping"
              sleep 2
            done
            echo "Database is ready!"
        env:
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              {{- if empty .Values.secret.existentName }}
              name: {{ template "sphinx.secretName" . }}
              {{- else }}
              name: {{ .Values.secret.existentName }}
              {{- end }}
              key: DATABASE_URL
      containers:
      - name: migrate
        image: migrate/migrate:{{ .Values.db.migration.version }}
        imagePullPolicy: {{ .Values.db.migration.imagePullPolicy }}
        command:
          - /bin/sh
          - -c
          - |
            echo "Starting database migration..."
            migrate -path /migrations -database "$DATABASE_URL" up
            echo "Migration completed successfully!"
        env:
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              {{- if empty .Values.secret.existentName }}
              name: {{ template "sphinx.secretName" . }}
              {{- else }}
              name: {{ .Values.secret.existentName }}
              {{- end }}
              key: DATABASE_URL
        volumeMounts:
        - name: migrations
          mountPath: /migrations
          readOnly: true
        resources:
          {{- toYaml .Values.db.migration.resources | nindent 10 }}
      volumes:
      - name: migrations
        configMap:
          name: {{ template "sphinx.prefix" . }}-migrations
      {{- if .Values.db.migration.imagePullSecretName }}
      imagePullSecrets:
      - name: {{ .Values.db.migration.imagePullSecretName }}
      {{- end }}
{{- end }}