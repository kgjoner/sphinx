apiVersion: v1
kind: Service
metadata:
  name: {{ template "api.serviceName" . }}
spec:
  selector:
    app: {{ .Chart.Name }}-api
  ports:
    - port: 80
      targetPort: 8080
  {{- if and (empty .Values.ingress.className) (not (empty .Values.serviceType)) }}
  type: {{ .Values.serviceType }}
  {{- end }}