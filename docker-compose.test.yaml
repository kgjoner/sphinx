services:
  pg-test:
    container_name: sphinx-pg-test
    image: postgres:16
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: ${DB_NAME:-sphinx}
    ports:
      - ${DB_PORT:-5432}:5432
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis-test:
    container_name: sphinx-redis-test
    image: redis:7-alpine
    ports:
      - ${REDIS_PORT:-6379}:6379
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  mailhog-test:
    container_name: sphinx-mailhog-test
    image: mailhog/mailhog:v1.0.1
    ports:
      - ${MAILHOG_SMTP_PORT:-1025}:1025  # SMTP port
      - ${MAILHOG_WEB_PORT:-8025}:8025  # Web UI port

  hermes-test:
    container_name: sphinx-hermes-test
    image: ${DOCKER_REGISTRY}hermes:latest
    environment:
      API_KEY: ${HERMES_API_KEY}
      SMTP_HOST: mailhog-test
      SMTP_PORT: ${MAILHOG_SMTP_PORT:-1025}
      SMTP_USER:
      SMTP_PASSWORD:
    ports:
      - ${HERMES_PORT:-8081}:8080
    depends_on:
      - mailhog-test
