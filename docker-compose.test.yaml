version: '3.7'

services:
  pg-test:
    container_name: sphinx-pg-test
    image: postgres:16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: sphinx_test
    ports:
      - 5433:5432
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis-test:
    container_name: sphinx-redis-test
    image: redis:7-alpine
    ports:
      - 6380:6379
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  mailhog-test:
    container_name: sphinx-mailhog-test
    image: mailhog/mailhog:v1.0.1
    ports:
      - 1026:1025  # SMTP port
      - 8026:8025  # Web UI port

  hermes-test:
    container_name: sphinx-hermes-test
    image: docker.elevendragons.com/hermes:latest
    environment:
      - API_KEY=topsecret
      - SMTP_HOST=mailhog-test
      - SMTP_PORT=1025
      - SMTP_USER=
      - SMTP_PASSWORD=
    ports:
      - 8082:8080
    depends_on:
      - mailhog-test
