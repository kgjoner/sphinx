{{define "subject"}}Redefinição de senha{{end}}

{{define "body"}}
  <h2>Olá, {{ .UserName }}</h2>

  <p>
    Recebemos uma solicitação para redefinir a senha da sua conta. Para prosseguir, clique no botão abaixo.
  </p>

  <button class="btn btn-primary">
    <a href="{{ .ResetURL }}" target="_blank">Redefinir Senha</a>
  </button>

  <p>Se você não fez esta solicitação, basta ignorar esse email.</p>
{{end}}
