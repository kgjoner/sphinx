version: '3.7'

services:
  db:
    container_name: sphinx-db
    image: postgres:16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: sphinx
    ports:
      - 5432:5432

  api:
    container_name: sphinx-api
    image: kgjoner/sphinx:dev
    build:
      context: ./
      target: development
    environment:
      - DATABASE_URL=postgres://postgres:postgres@db:5432/sphinx?sslmode=disable
    ports:
      - 8080:8080
    depends_on:
      - db