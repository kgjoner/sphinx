# Default values for sphinx-api.
api:
  image:
    repository: docker.kgjoner.com.br/sphinx
    tag: "" # If empty, uses Chart.AppVersion
    pullPolicy: Always
  replicaCount: 1
  imagePullSecretName:

ingress:
  className:
  # Rules are only applied if className is set. 
  rules:
  - host: sphinx.com
    path: /
  # Let issuer empty to disable TLS. Enable only if cert-manager is already running in the machine 
  # along desired issuers.
  tls:
    issuer:

# Only applied if ingress className is NOT set.
# serviceType: NodePort

secret:
  # existentName:
  # If existentName is set, below configurations will not be used 
  databaseURL: postgres://postgres:postgres@sphinx-db:5432/sphinx
  redisURL: redis://redis:redis@rdb:6379/0
  rootAppID: 80cadd74-5ccd-41c4-9938-3c8961be04db
  jwtSecret: mysecret
  jwtEncryptionKey: mysecret
  smtpHost:
  smtpPort:
  smtpUsername:
  smtpPassword:
  swaggerAuth:
    admin: topsecret
  # Use the following with caution, only with trusted providers, as this may open security vulnerabilities.
  # externalAuthProviders:
  # - name: myprovider
  #   url: api.myprovider.com/v1/api/auth
  #   method: GET
  #   headers:
  #     apiKey: myproviderapikey
  #   subjectIDPath: user.id
  #   emailPath: user.email

configMap:
  appName: Sphinx
  # appStyleURL:
  # appLogoURL:
  supportEmail: support@example.com
  maxConcurrentSessions: 0
  fallbackLanguage: pt-br
  authGrantLifetimeInSec: "300"
  jwtAlgorithm: RS256
  jwtAccessLifetimeInSec: "900"
  jwtRefreshLifetimeInSec: "15552000"
  jwtKeyRotationIntervalHours: "8760"
  clientBaseURL: sphinx.com.br
  clientDataVerification: /verification
  clientPasswordReset: /password/reset
  # emailTemplates:
  #   pt-br: 
  #     welcome:
  #       subject:
  #         content: "Boas-vindas, {{ .UserName }}"
  #       body:
  #         - kind: text
  #           content: "E aí, preparado para o desafio?"

prometheus:
  # Only enable if there is a running instance of prometheus
  enabled: false

db:
  enabled: false
  replicaCount: 1
  # Below configuration is only used if db is enabled
  secret:
    # existentName:
    # If existentName is set, below configurations will not be used
    user: postgres
    password: postgres
    database: sphinx
  volume:
    # Let className empty to disable volume. Get a value accordingly to your cloud provider spec.
    className: hcloud-volumes
    name: sphinx-data 
    accessMode: ReadWriteOnce
    size: 10Gi
  migration:
    enabled: false
    version: v4.17.0 # golang-migrate
    imagePullPolicy: IfNotPresent
    # imagePullSecretName: regcred  # Uncomment if using private registry
    resources:
      limits:
        cpu: 100m
        memory: 128Mi
      requests:
        cpu: 50m
        memory: 64Mi  

redis:
  enabled: false
  replicaCount: 1
  # Below configuration is only used if redis is enabled
  config:
    # existentName:
    # If existentName is set, below configurations will not be used
    user: redis
    password: redis
  volume:
    className: ""  # Empty for no persistent storage
    accessMode: ReadWriteOnce
    size: 1Gi
