apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ template "sphinx.configMapName" . }}
  labels:
    app.kubernetes.io/name: {{ .Chart.Name }}
    app.kubernetes.io/instance: {{ template "sphinx.prefix" . }}
    app.kubernetes.io/version: {{ template "sphinx.version" . }}
    app.kubernetes.io/component: server
    app.kubernetes.io/part-of: {{ .Chart.Name }}
    app.kubernetes.io/managed-by: {{ .Release.Service }}
data:
  SCHEME: {{ if not (empty .Values.ingress.tls.issuer) }}https{{ else }}http{{ end }}
  {{- if not (empty .Values.ingress.className) }}
  {{- with (first .Values.ingress.rules) }}
  HOST: {{ .host }}
  {{- if and (not (empty .path)) (not (equal .path "/")) }}BASE_PATH: {{ .path }}{{- end }}
  {{- end }}
  {{- else }}
  HOST: {{ template "sphinx.serviceName" . }}
  {{- end }}
  APP_NAME: {{ .Values.configMap.appName }}
  APP_STYLE_URL: {{ .Values.configMap.appStyleURL }}
  APP_LOGO_URL: {{ .Values.configMap.appLogoURL }}
  SUPPORT_EMAIL: {{ .Values.configMap.supportEmail }}
  MAX_CONCURRENT_SESSIONS: {{ .Values.configMap.maxConcurrentSessions | quote }}
  FALLBACK_LANGUAGE: {{ .Values.configMap.fallbackLanguage }}
  AUTH_GRANT_LIFETIME_IN_SEC: {{ .Values.configMap.authGrantLifetimeInSec | quote }}
  JWT_ALGORITHM: {{ .Values.configMap.jwtAlgorithm }}
  JWT_ACCESS_LIFETIME_IN_SEC: {{ .Values.configMap.jwtAccessLifetimeInSec | quote }}
  JWT_REFRESH_LIFETIME_IN_SEC: {{ .Values.configMap.jwtRefreshLifetimeInSec | quote }}
  JWT_KEY_ROTATION_INTERVAL_HOURS: {{ .Values.configMap.jwtKeyRotationIntervalHours | quote }}
  CLIENT_BASE_URL: {{ .Values.configMap.clientBaseURL }}
  CLIENT_DATA_VERIFICATION: {{ .Values.configMap.clientDataVerification }}
  CLIENT_PASSWORD_RESET: {{ .Values.configMap.clientPasswordReset }}
  EMAIL_TEMPLATES: {{ .Values.configMap.emailTemplates | toJson | quote }}