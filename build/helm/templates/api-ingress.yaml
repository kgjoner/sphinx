{{- $versionPath := regexFind "^v\\d+" (include "sphinx.version" .) -}}

{{- if empty $versionPath }}
  {{- fail (printf "Invalid image tag '%s'. Must be semantic version (e.g., v1.2.3 or just v1)" (include "sphinx.version" .)) }}
{{- end }}

{{- if eq .Values.ingress.className "traefik" }}
# ======================================================
# TRAEFIK
# ======================================================
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: {{ template "sphinx.prefix" . }}-ingress
  labels:
    app.kubernetes.io/name: {{ .Chart.Name }}
    app.kubernetes.io/instance: {{ template "sphinx.prefix" . }}
    app.kubernetes.io/version: {{ template "sphinx.version" . }}
    app.kubernetes.io/component: server
    app.kubernetes.io/part-of: {{ .Chart.Name }}
    app.kubernetes.io/managed-by: {{ .Release.Service }}
spec:
  entryPoints:
    - web
  routes:
  {{- range .Values.ingress.rules }}
    {{- if and (not (empty .path)) (not (eq .path "/"))}}
  - match: Host(`{{ .host }}`) && PathPrefix(`{{ .path }}/{{ $versionPath }}`)
    {{- else }}
  - match: Host(`{{ .host }}`) && PathPrefix(`/{{ $versionPath }}`)
    {{- end }}
    kind: Rule
    services:
    - name: {{ template "sphinx.serviceName" $ }}
      port: 80
  {{- end }}

  {{- if not (empty .Values.ingress.tls.issuer) }}
---
# Traefik TLS
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: {{ template "sphinx.prefix" . }}-ingress-tls
  labels:
    app.kubernetes.io/name: {{ .Chart.Name }}
    app.kubernetes.io/instance: {{ template "sphinx.prefix" . }}
    app.kubernetes.io/version: {{ template "sphinx.version" . }}
    app.kubernetes.io/component: server
    app.kubernetes.io/part-of: {{ .Chart.Name }}
    app.kubernetes.io/managed-by: {{ .Release.Service }}
spec:
  entryPoints:
    - websecure
  routes:
  {{- range .Values.ingress.rules }}
    {{- if and (not (empty .path)) (not (eq .path "/"))}}
  - match: Host(`{{ .host }}`) && PathPrefix(`{{ .path }}/{{ $versionPath }}`)
    {{- else }}
  - match: Host(`{{ .host }}`) && PathPrefix(`/{{ $versionPath }}`)
    {{- end }}
    kind: Rule
    services:
    - name: {{ template "sphinx.serviceName" $ }}
      port: 80
  {{- end }}
  tls:
    secretName: {{ template "sphinx.prefix" . }}-tls
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: {{ template "sphinx.prefix" . }}-cert
  labels:
    app.kubernetes.io/name: {{ .Chart.Name }}
    app.kubernetes.io/instance: {{ template "sphinx.prefix" . }}
    app.kubernetes.io/version: {{ template "sphinx.version" . }}
    app.kubernetes.io/component: server
    app.kubernetes.io/part-of: {{ .Chart.Name }}
    app.kubernetes.io/managed-by: {{ .Release.Service }}
spec:
  secretName: {{ template "sphinx.prefix" . }}-tls
  issuerRef:
    kind: ClusterIssuer
    name: letsencrypt-prod
  dnsNames:
    {{- range .Values.ingress.rules }}
    - {{ .host }}
    {{- end }}
  {{- end }}


{{- else if not (empty .Values.ingress.className) }}
# ======================================================
# OTHERS
# ======================================================
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ template "sphinx.prefix" . }}-ingress
  labels:
    app.kubernetes.io/name: {{ .Chart.Name }}
    app.kubernetes.io/instance: {{ template "sphinx.prefix" . }}
    app.kubernetes.io/version: {{ template "sphinx.version" . }}
    app.kubernetes.io/component: server
    app.kubernetes.io/part-of: {{ .Chart.Name }}
    app.kubernetes.io/managed-by: {{ .Release.Service }}
  annotations:
    {{- if not (empty .Values.ingress.tls.issuer) }}
    cert-manager.io/cluster-issuer: {{ .Values.ingress.tls.issuer | quote }}
    {{- end }}
    kubernetes.io/ingress.class: {{ .Values.ingress.className }}
spec:
  # ingressClassName: {{ .Values.ingress.className }}
  {{- if not (empty .Values.ingress.tls.issuer) }}
  tls:
    - hosts:
      {{- range .Values.ingress.rules }}
      - {{ .host }}
      {{- end }}
      secretName: {{ template "sphinx.prefix" . }}-tls
  {{- end }}
  rules:
    {{- range .Values.ingress.rules }}
    - host: {{ .host }}
      http:
        paths:
        - path: {{ .path }}
          pathType: Prefix
          backend:
            service:
              name: {{ template "sphinx.serviceName" $ }}
              port: 
                number: 80
    {{- end }}
{{- end }}
